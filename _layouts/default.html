<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: "Observatório da Estratégia" }}</title>
    <meta name="description" content="Observatório da Estratégia - Grupo de Pesquisa e Think Tank em Estratégia, Cultura, Tecnologia e Futuros da Universidade Federal de Juiz de Fora.">
    <link rel="icon" type="image/png" href="/assets/img/logo fiocruz web preto.png" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" href="/assets/img/logo fiocruz web branco.png" media="(prefers-color-scheme: dark)">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Inter:wght@300;400;600;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/main.css">
    {% if page.url == "/" %}
    <link rel="preload" as="image" href="/assets/img/castelo-fiocruz.jpg" fetchpriority="high">
    {% endif %}
    
    <!-- Index specific style for navbar override, keeping it here as it was in index.html -->
    <style>
        /* Ensure Index Navigation matches others exactly in size/border */
        .navbar .nav-links .nav-btn {
            border: 2px solid #ffffff !important; /* Thick border like others */
            padding: 8px 20px; /* Ensure size match */
            font-weight: 600;
        }
        
        .navbar .container {
             padding: 10px 20px; /* Standardize vertical padding */
        }
    </style>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
    <script>
        // Observatório da Estratégia uses a fixed dark theme.
        (function() {
            document.body.classList.add('dark-mode');
            localStorage.setItem('theme', 'dark');
        })();
    </script>

    {% include navbar.html %}

    {{ content }}

    {% unless page.url == "/" %}
    {% include social-bar.html %}
    {% endunless %}

    <script src="/assets/js/main.js"></script>
    <div id="google_translate_element"></div>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'pt',
                includedLanguages: 'en,pt', // Limitado a Inglês e Português para o Toggle
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
